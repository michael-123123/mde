name: Build Linux AppImage

# Triggers:
#   - workflow_dispatch - manual button in the Actions tab
#   - push on v*.*.* tags - attaches the AppImage to the GitHub Release
#
# What this workflow is:
#   A thin wrapper that rents an Ubuntu 22.04 VM and runs the standalone
#   packaging/build.sh --appimage. The build itself is independent of GHA -
#   any developer on Linux can reproduce it locally.
#
# Why ubuntu-22.04 (not ubuntu-latest):
#   AppImages are sensitive to the host glibc at build time. Building on
#   Ubuntu 22.04 (glibc 2.35) means the AppImage runs on any Linux with
#   glibc >= 2.35, which covers Ubuntu 22.04+, Debian 12+, Fedora 36+, etc.
#   ubuntu-latest is currently 24.04 (glibc 2.39) - narrower compat. The
#   older ubuntu-20.04 image was removed from GHA in April 2025.

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # needed to attach release assets on tag push

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools-scm needs full tag history for version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ubuntu-22.04-py3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-ubuntu-22.04-py3.12-

      # Qt6 / PySide6 links against EGL, OpenGL, XCB, Xkbcommon etc. at load time.
      # GHA's ubuntu-22.04 image is a minimal/headless install and doesn't ship
      # most of these. Without this step, either (a) pyside6-deploy's build-time
      # `import PySide6` fails, or (b) the smoke test inside the AppImage fails
      # with `libEGL.so.1: cannot open shared object file`. Installing them on
      # the build machine also means pyside6-deploy bundles them into the
      # AppImage, so end users on minimal Linux distros get a self-contained
      # artifact. Full list distilled from Qt 6 runtime deps + what a headless
      # GHA runner lacks by default.
      - name: Install Qt6 runtime system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libfontconfig1 libdbus-1-3

      - name: Install project + build deps
        run: pip install -e ".[build]"

      # nproc on GHA ubuntu-22.04 returns 4 (full runner cores) - we want
      # ALL of them, unlike the floor(nproc/2) default that protects a dev's
      # workstation from being clobbered during a build.
      - name: Build AppImage
        run: bash packaging/build.sh --appimage --jobs=$(nproc)

      # Headless smoke tests - runners have no display server, so we can't
      # verify the GUI. These at least confirm the AppImage self-extracts,
      # loads Qt, imports everything, and runs the CLI argparse + subcommand
      # dispatch. --appimage-extract-and-run avoids needing FUSE kernel
      # support (GHA Linux runners often don't have /dev/fuse).
      - name: Smoke test (CLI)
        run: |
          APPIMAGE=$(ls build/MarkdownEditor-*-x86_64.AppImage | head -1)
          echo "testing: $APPIMAGE"
          "$APPIMAGE" --appimage-extract-and-run --version
          "$APPIMAGE" --appimage-extract-and-run --help | head -20
          "$APPIMAGE" --appimage-extract-and-run stats README.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mde-linux-appimage
          path: build/MarkdownEditor-*-x86_64.AppImage
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/MarkdownEditor-*-x86_64.AppImage

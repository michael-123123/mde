    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Find all unrendered graphviz blocks (those with raw DOT source)
            document.querySelectorAll('.graphviz-pending').forEach(async function(el) {
                try {
                    const source = el.textContent;
                    const viz = await Viz.instance();
                    const svg = viz.renderSVGElement(source);
                    el.innerHTML = '';
                    el.appendChild(svg);
                    el.classList.remove('graphviz-pending');
                    el.classList.add('graphviz-diagram');
                } catch (e) {
                    el.innerHTML = '<div class="graphviz-error">' +
                        '<div class="graphviz-error-header">Graphviz Error</div>' +
                        '<pre class="graphviz-error-source">' + el.textContent.replace(/</g, '&lt;') + '</pre>' +
                        '<div class="graphviz-error-message">' + e.message.replace(/</g, '&lt;') + '</div>' +
                        '</div>';
                    el.classList.remove('graphviz-pending');
                }
            });
        });
    </script>
    
            <script>
            /* Ctrl+click on images/diagrams → open in external app */
            document.addEventListener('mousemove', function(e) {
                document.body.classList.toggle('ctrl-held', e.ctrlKey || e.metaKey);
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Control' || e.key === 'Meta') document.body.classList.add('ctrl-held');
            });
            document.addEventListener('keyup', function(e) {
                if (e.key === 'Control' || e.key === 'Meta') document.body.classList.remove('ctrl-held');
            });
            window.addEventListener('blur', function() {
                document.body.classList.remove('ctrl-held');
            });
            document.addEventListener('click', function(e) {
                if (!e.ctrlKey && !e.metaKey) return;
                var el = e.target;
                while (el && el !== document.body) {
                    if (el.tagName === 'IMG') {
                        e.preventDefault();
                        e.stopPropagation();
                        window.location.href = 'open-image://img?src=' + encodeURIComponent(el.src);
                        return;
                    }
                    if (el.tagName === 'svg' || (el.classList && (
                        el.classList.contains('mermaid-diagram') ||
                        el.classList.contains('graphviz-diagram')))) {
                        var container = el.closest('.mermaid-diagram, .graphviz-diagram');
                        if (container && container.dataset.source) {
                            e.preventDefault();
                            e.stopPropagation();
                            var kind = container.classList.contains('mermaid-diagram') ? 'mermaid' : 'graphviz';
                            window._pendingDiagramSource = container.dataset.source;
                            window.location.href = 'open-image://diagram?kind=' + kind;
                            return;
                        }
                    }
                    el = el.parentElement;
                }
            }, true);

            /* Source-line-based scroll synchronization */
            function scrollToSourceLine(line) {
                var anchors = document.querySelectorAll('[data-source-line]');
                if (anchors.length === 0) {
                    /* Fallback to proportional scroll */
                    var total = document.body.dataset.totalLines || 1;
                    window.scrollTo(0, document.body.scrollHeight * (line / total));
                    return;
                }

                var before = null, after = null;
                for (var i = 0; i < anchors.length; i++) {
                    var al = parseInt(anchors[i].dataset.sourceLine, 10);
                    if (al <= line) {
                        before = { el: anchors[i], line: al };
                    }
                    if (al > line && after === null) {
                        after = { el: anchors[i], line: al };
                        break;
                    }
                }

                if (!before && !after) return;

                var targetY;
                if (!before) {
                    targetY = after.el.getBoundingClientRect().top + window.scrollY;
                } else if (!after) {
                    var beforeY = before.el.getBoundingClientRect().top + window.scrollY;
                    var docBottom = document.body.scrollHeight;
                    var totalLines = parseInt(document.body.dataset.totalLines || '0', 10);
                    if (totalLines > before.line) {
                        var t = (line - before.line) / (totalLines - before.line);
                        targetY = beforeY + t * (docBottom - beforeY);
                    } else {
                        targetY = beforeY;
                    }
                } else {
                    var beforeY = before.el.getBoundingClientRect().top + window.scrollY;
                    var afterY = after.el.getBoundingClientRect().top + window.scrollY;
                    var t = (after.line === before.line) ? 0 : (line - before.line) / (after.line - before.line);
                    targetY = beforeY + t * (afterY - beforeY);
                }

                window.scrollTo(0, Math.max(0, targetY));
            }

            /* Copy-to-clipboard button on every <pre> in the preview.
               Buttons are injected on initial load and re-injected after
               incremental innerHTML updates via a MutationObserver. */
            (function() {
                if (window._mdeCopyInit) return;
                window._mdeCopyInit = true;

                /* Inline SVG icons — avoid emoji so the renderer never attempts
                   to resolve a color-emoji font (which can trigger network
                   lookups on systems lacking a local emoji font). */
                var ICON_IDLE = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
                var ICON_DONE = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>';

                function installButton(host, label) {
                    if (host.querySelector(':scope > .mde-copy-btn')) return;
                    var btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'mde-copy-btn';
                    btn.setAttribute('aria-label', label);
                    btn.title = label;
                    btn.innerHTML = ICON_IDLE;
                    host.appendChild(btn);
                }

                function installAll() {
                    var content = document.getElementById('md-content');
                    if (!content) return;
                    var pres = content.querySelectorAll('pre');
                    for (var i = 0; i < pres.length; i++) {
                        // Skip the <pre> inside a pending-diagram loading
                        // placeholder — the enclosing diagram div gets its
                        // own button below, and a second "Copy code" button
                        // would stack on top of it.
                        if (pres[i].closest('.diagram-loading')) continue;
                        installButton(
                            pres[i].closest('.highlight') || pres[i],
                            'Copy code'
                        );
                    }
                    var diagrams = content.querySelectorAll(
                        '.mermaid-diagram, .graphviz-diagram'
                    );
                    for (var j = 0; j < diagrams.length; j++) {
                        installButton(diagrams[j], 'Copy diagram source');
                    }
                }

                /* Unescape HTML entities in a string (used to pull the
                   diagram source back out of the container's data-source
                   attribute, which is HTML-escaped by the preprocessor). */
                function unescapeHtml(s) {
                    var ta = document.createElement('textarea');
                    ta.innerHTML = s;
                    return ta.value;
                }

                function fallbackCopy(text) {
                    try {
                        var ta = document.createElement('textarea');
                        ta.value = text;
                        ta.setAttribute('readonly', '');
                        ta.style.position = 'fixed';
                        ta.style.opacity = '0';
                        document.body.appendChild(ta);
                        ta.select();
                        var ok = document.execCommand('copy');
                        document.body.removeChild(ta);
                        return ok;
                    } catch (e) {
                        return false;
                    }
                }

                function flash(btn, ok) {
                    btn.innerHTML = ok ? ICON_DONE : '!';
                    btn.classList.add('mde-copied');
                    setTimeout(function() {
                        btn.innerHTML = ICON_IDLE;
                        btn.classList.remove('mde-copied');
                    }, 1500);
                }

                document.addEventListener('click', function(e) {
                    var btn = e.target && e.target.closest && e.target.closest('.mde-copy-btn');
                    if (!btn) return;
                    e.preventDefault();
                    e.stopPropagation();
                    var host = btn.parentElement;
                    if (!host) return;
                    var text = '';
                    if (host.classList && (
                        host.classList.contains('mermaid-diagram') ||
                        host.classList.contains('graphviz-diagram'))) {
                        text = unescapeHtml(host.dataset.source || '');
                    } else {
                        var pre = host.tagName === 'PRE' ? host : host.querySelector('pre');
                        if (!pre) return;
                        var code = pre.querySelector('code');
                        text = (code || pre).textContent || '';
                    }
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(text).then(
                            function() { flash(btn, true); },
                            function() { flash(btn, fallbackCopy(text)); }
                        );
                    } else {
                        flash(btn, fallbackCopy(text));
                    }
                });

                installAll();
                var content = document.getElementById('md-content');
                if (content && typeof MutationObserver !== 'undefined') {
                    var observer = new MutationObserver(function() { installAll(); });
                    observer.observe(content, { childList: true, subtree: true });
                }
            })();
            </script>
        </body>
        </html>
